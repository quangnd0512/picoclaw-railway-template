                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Ignore (comma-separated)</label>
                                    <input type="text" class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" x-model="config.hermes.provider_routing.ignore" placeholder="e.g. google" />
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Order (comma-separated)</label>
                                    <input type="text" class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" x-model="config.hermes.provider_routing.order" placeholder="e.g. anthropic,openai" />
                                </div>
                                <div class="flex items-center gap-2 mt-6">
                                    <input type="checkbox" class="rounded bg-gray-100 border-gray-300 dark:bg-gray-800 dark:border-gray-600" x-model="config.hermes.provider_routing.require_parameters" />
                                    <label class="text-sm text-gray-700 dark:text-gray-300">Require Parameters</label>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section x-show="backend === 'hermes'">
                        <h2 class="text-lg font-semibold mb-3">Fallback Model</h2>
                        <div class="bg-white border border-gray-200 dark:bg-gray-900 dark:border-gray-800 rounded-xl p-4 mb-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Provider</label>
                                    <input type="text" class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" x-model="config.hermes.fallback_model.provider" placeholder="e.g. openrouter" />
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-500 mb-1">Model</label>
                                    <input type="text" class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" x-model="config.hermes.fallback_model.model" placeholder="e.g. openai/gpt-4o-mini" />
                                </div>
                            </div>
                        </div>
                    </section>

                    <section x-show="backend === 'hermes'">
                        <div class="flex items-center justify-between mb-3">
                            <h2 class="text-lg font-semibold">MCP Servers</h2>
                            <button type="button" @click="config.hermes.mcp_servers.push({name: '', command: '', args: '', env: '', url: '', timeout: 60})" class="text-sm px-3 py-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 dark:bg-blue-900/20 dark:text-blue-400 dark:hover:bg-blue-900/40 rounded-lg transition">
                                + Add Server
                            </button>
                        </div>
                        <div class="space-y-4 mb-4">
                            <template x-for="(server, index) in config.hermes.mcp_servers" :key="index">
                                <div class="bg-white border border-gray-200 dark:bg-gray-900 dark:border-gray-800 rounded-xl p-4 relative">
                                    <button type="button" @click="config.hermes.mcp_servers.splice(index, 1)" class="absolute top-4 right-4 text-red-500 hover:text-red-600 dark:text-red-400 dark:hover:text-red-300">
                                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><title>Remove Server</title><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pr-8">
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">Name</label>
                                            <input type="text" class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" x-model="server.name" placeholder="e.g. filesystem" />
                                        </div>
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">Command</label>
                                            <input type="text" class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" x-model="server.command" placeholder="e.g. npx" />
                                        </div>
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">Args (comma-separated)</label>
                                            <input type="text" class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" x-model="server.args" placeholder="e.g. -y,@modelcontextprotocol/server-filesystem,/tmp" />
                                        </div>
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">Env (key=value, comma-separated)</label>
                                            <input type="text" class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" x-model="server.env" placeholder="e.g. KEY1=value1,KEY2=value2" />
                                        </div>
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">URL (for SSE/HTTP)</label>
                                            <input type="text" class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" x-model="server.url" placeholder="e.g. http://localhost:8000/sse" />
                                        </div>
                                        <div>
                                            <label class="block text-xs text-gray-500 mb-1">Timeout (seconds)</label>
                                            <input type="number" class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" x-model.number="server.timeout" />
                                        </div>
                                    </div>
                                </div>
                            </template>
                            <div x-show="config.hermes.mcp_servers.length === 0" class="text-center py-8 text-gray-500 dark:text-gray-400 bg-white border border-gray-200 dark:bg-gray-900 dark:border-gray-800 rounded-xl">
                                No MCP servers configured.
                            </div>
                        </div>
                    </section>
