                    <section>

                            <table class="w-full text-sm">
                                <thead
                                    class="bg-gray-100/50 dark:bg-gray-800/50"
                                >
                                    <tr>
                                        <th

                                            Status

                                </thead>

                                        x-for="(info, name) in (status.providers || {})"

                                                ></span>
                                            </td>

                            </table>
