                    <section>
                        <div class="flex items-center justify-between mb-3">
                            <h2 class="text-lg font-semibold">Gateway</h2>
                            <div class="flex items-center gap-2 text-sm font-medium px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300">
                                <span x-show="backend === 'picoclaw'">Backend: 🐾 PicoClaw</span>
                                <span x-show="backend === 'hermes'">Backend: 🔮 Hermes</span>
                                <span x-show="backend !== 'picoclaw' && backend !== 'hermes'" x-text="'Backend: ❓ ' + (backend || 'Unknown')"></span>
                            </div>
                        </div>
                        <div
                            class="bg-white border border-gray-200 dark:bg-gray-900 dark:border-gray-800 rounded-xl p-4"
                        >
                            <div class="flex items-center justify-between mb-4">
                                <div class="flex items-center gap-4">
                                    <div>
                                        <span class="text-xs text-gray-500"
                                            >State</span
                                        >
                                        <p
                                            class="font-medium"
                                            :class="{
                    'text-emerald-600 dark:text-emerald-400': status.gateway?.state === 'running',
                    'text-red-600 dark:text-red-400': status.gateway?.state === 'error',
                    'text-yellow-600 dark:text-yellow-400': status.gateway?.state === 'starting' || status.gateway?.state === 'stopping',
                    'text-gray-500 dark:text-gray-400': status.gateway?.state === 'stopped'
                  }"
                                            x-text="status.gateway?.state || 'unknown'"
                                        ></p>
                                    </div>
                                    <div x-show="status.gateway?.pid">
                                        <span class="text-xs text-gray-500"
                                            >PID</span
                                        >
                                        <p
                                            class="font-medium"
                                            x-text="status.gateway?.pid"
                                        ></p>
                                    </div>
                                    <div
                                        x-show="status.gateway?.uptime != null"
                                    >
                                        <span class="text-xs text-gray-500"
                                            >Uptime</span
                                        >
                                        <p
                                            class="font-medium"
                                            x-text="formatUptime(status.gateway?.uptime)"
                                        ></p>
                                    </div>
                                    <div>
                                        <span class="text-xs text-gray-500"
                                            >Restarts</span
                                        >
                                        <p
                                            class="font-medium"
                                            x-text="status.gateway?.restart_count ?? 0"
                                        ></p>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button
                                        type="button"
                                        @click="startGateway()"
                                        class="text-xs px-3 py-1.5 bg-emerald-100 text-emerald-700 hover:bg-emerald-200 dark:bg-emerald-600/20 dark:text-emerald-400 dark:hover:bg-emerald-600/30 rounded-lg transition"
                                        :disabled="status.gateway?.state === 'running'"
                                    >
                                        Start
                                    </button>
                                    <button
                                        type="button"
                                        @click="stopGateway()"
                                        class="text-xs px-3 py-1.5 bg-red-100 text-red-700 hover:bg-red-200 dark:bg-red-600/20 dark:text-red-400 dark:hover:bg-red-600/30 rounded-lg transition"
                                        :disabled="status.gateway?.state === 'stopped'"
                                    >
                                        Stop
                                    </button>
                                    <button
                                        type="button"
                                        @click="restartGateway()"
                                        class="text-xs px-3 py-1.5 bg-blue-100 text-blue-700 hover:bg-blue-200 dark:bg-blue-600/20 dark:text-blue-400 dark:hover:bg-blue-600/30 rounded-lg transition"
                                    >
                                        Restart
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>
