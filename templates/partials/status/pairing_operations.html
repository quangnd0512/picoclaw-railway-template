                    <!-- Pairing Operations Section (Hermes only) -->
                    <section x-show="backend === 'hermes'" x-cloak>
                        <h2 class="text-lg font-semibold mb-3">Pairing Operations</h2>
                        <div class="bg-white border border-gray-200 dark:bg-gray-900 dark:border-gray-800 rounded-xl p-4 space-y-4">
                            <!-- Refresh/List Button -->
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-gray-500 dark:text-gray-400">Manage device pairings for messaging channels</span>
                                <button
                                    type="button"
                                    @click="loadPairingList()"
                                    :disabled="pairing.loading"
                                    class="text-xs px-3 py-1.5 bg-blue-100 text-blue-700 hover:bg-blue-200 dark:bg-blue-600/20 dark:text-blue-400 dark:hover:bg-blue-600/30 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    <span x-show="!pairing.loading">Refresh List</span>
                                    <span x-show="pairing.loading">Loading...</span>
                                </button>
                            </div>

                            <!-- Approve Pairing Form -->
                            <div class="border-t border-gray-200 dark:border-gray-700 pt-4">
                                <h3 class="text-sm font-medium mb-3 text-gray-700 dark:text-gray-300">Approve Pairing</h3>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    <div>
                                        <label class="block text-xs text-gray-500 mb-1">Platform</label>
                                        <select
                                            x-model="pairing.approvePlatform"
                                            class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        >
                                            <option value="telegram">Telegram</option>
                                            <option value="discord">Discord</option>
                                            <option value="slack">Slack</option>
                                            <option value="whatsapp">WhatsApp</option>
                                            <option value="signal">Signal</option>
                                            <option value="email">Email</option>
                                            <option value="homeassistant">Home Assistant</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-500 mb-1">Pairing Code</label>
                                        <input
                                            type="text"
                                            x-model="pairing.pendingCode"
                                            maxlength="8"
                                            placeholder="8-char code"
                                            class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 uppercase"
                                        >
                                    </div>
                                    <div class="flex items-end">
                                        <button
                                            type="button"
                                            @click="approvePairingCode()"
                                            :disabled="pairing.loading || !pairing.pendingCode.trim()"
                                            class="w-full text-xs px-3 py-2 bg-emerald-100 text-emerald-700 hover:bg-emerald-200 dark:bg-emerald-600/20 dark:text-emerald-400 dark:hover:bg-emerald-600/30 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            Approve
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Revoke Pairing Form -->
                            <div class="border-t border-gray-200 dark:border-gray-700 pt-4">
                                <h3 class="text-sm font-medium mb-3 text-gray-700 dark:text-gray-300">Revoke Pairing</h3>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    <div>
                                        <label class="block text-xs text-gray-500 mb-1">Platform</label>
                                        <select
                                            x-model="pairing.revokePlatform"
                                            class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        >
                                            <option value="telegram">Telegram</option>
                                            <option value="discord">Discord</option>
                                            <option value="slack">Slack</option>
                                            <option value="whatsapp">WhatsApp</option>
                                            <option value="signal">Signal</option>
                                            <option value="email">Email</option>
                                            <option value="homeassistant">Home Assistant</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs text-gray-500 mb-1">User ID</label>
                                        <input
                                            type="text"
                                            x-model="pairing.revokeUserId"
                                            placeholder="User identifier"
                                            class="w-full bg-gray-100 border border-gray-300 dark:bg-gray-800 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"
                                        >
                                    </div>
                                    <div class="flex items-end">
                                        <button
                                            type="button"
                                            @click="revokePairingUser()"
                                            :disabled="pairing.loading || !pairing.revokeUserId.trim()"
                                            class="w-full text-xs px-3 py-2 bg-red-100 text-red-700 hover:bg-red-200 dark:bg-red-600/20 dark:text-red-400 dark:hover:bg-red-600/30 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            Revoke
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Clear Pending Button -->
                            <div class="border-t border-gray-200 dark:border-gray-700 pt-4">
                                <div class="flex items-center justify-between">
                                    <div>
                                        <h3 class="text-sm font-medium text-gray-700 dark:text-gray-300">Clear Pending Pairings</h3>
                                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Remove all pending pairing requests</p>
                                    </div>
                                    <button
                                        type="button"
                                        @click="clearPendingPairings()"
                                        :disabled="pairing.loading"
                                        class="text-xs px-3 py-1.5 bg-yellow-100 text-yellow-700 hover:bg-yellow-200 dark:bg-yellow-600/20 dark:text-yellow-400 dark:hover:bg-yellow-600/30 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        Clear All Pending
                                    </button>
                                </div>
                            </div>

                            <!-- Results Display -->
                            <div x-show="pairing.lastResult" class="border-t border-gray-200 dark:border-gray-700 pt-4">
                                <h3 class="text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">Last Result</h3>
                                <pre
                                    class="bg-gray-100 dark:bg-gray-800 rounded-lg p-3 text-xs overflow-x-auto text-gray-700 dark:text-gray-300"
                                    x-text="JSON.stringify(pairing.lastResult, null, 2)"
                                ></pre>
                            </div>
                        </div>
                    </section>
