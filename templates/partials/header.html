            <header class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🦐</span>
                    <h1 class="text-2xl font-bold tracking-tight">KKV Claw</h1>
                    <span
                        class="text-xs px-2 py-0.5 rounded-full font-medium"
                        :class="status.gateway?.state === 'running' ? 'bg-emerald-500/20 text-emerald-600 dark:text-emerald-400' : status.gateway?.state === 'error' ? 'bg-red-500/20 text-red-600 dark:text-red-400' : 'bg-gray-200 text-gray-500 dark:bg-gray-700 dark:text-gray-400'"
                        x-text="status.gateway?.state || 'unknown'"
                    ></span>
                </div>
                <button
                    type="button"
                    @click="restartGateway()"
                    class="text-sm px-3 py-1.5 bg-gray-200 hover:bg-gray-300 dark:bg-gray-800 dark:hover:bg-gray-700 rounded-lg transition"
                >
                    Restart Gateway
                </button>
            </header>
